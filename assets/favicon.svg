<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark bg for favicon legibility in browser tab -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.35"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>
  <!-- 8-point star cross (thin, Concept A) -->
  <line x1="8.5" y1="16" x2="23.5" y2="16" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="8.5" x2="16" y2="23.5" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Diagonals -->
  <line x1="11.2" y1="11.2" x2="20.8" y2="20.8" stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="20.8" y1="11.2" x2="11.2" y2="20.8" stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- Core -->
  <circle cx="16" cy="16" r="2.5" fill="#1a3d6e" stroke="#4a9eff" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="1" fill="#8bc4ff"/>
  <circle cx="16" cy="16" r="0.4" fill="#ffffff"/>
</svg>
